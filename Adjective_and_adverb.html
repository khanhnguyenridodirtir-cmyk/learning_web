<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sơ Đồ Tư Duy Ngữ Pháp - Tính Từ & Trạng Từ</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM (CDN) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (để biên dịch JSX ngay trên trình duyệt) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Tinh chỉnh scrollbar cho đẹp */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        body { background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- HỆ THỐNG DỮ LIỆU CỐT LÕI (BẢN CHẤT & QUY LUẬT) ---
        const tagsData = ['#tất-cả', '#ngoại-lệ', '#vị-trí-linh-hoạt', '#trước-danh-từ', '#sau-động-từ', '#biến-đổi-hình-thái', '#chỉ-mức-độ', '#cấu-trúc-câu'];

        const grammarData = {
          adjectives: [
            {
              id: 'adj_desc',
              title: 'Tính từ Miêu tả (Descriptive)',
              icon: <i className="fa-solid fa-book-open text-[18px]"></i>,
              nature: 'Bản chất tĩnh. Mang tính gán mác, định hình tính chất, hình dáng, màu sắc, trạng thái của một sự vật/hiện tượng.',
              rules: 'Thường đứng TRƯỚC danh từ hoặc SAU động từ liên kết (tobe, seem, feel, look...).',
              tags: ['#trước-danh-từ', '#biến-đổi-hình-thái'],
              examples: ['A *beautiful* painting.', 'The soup smells *delicious*.'],
              relations: ['Sinh ra Trạng từ Thể cách bằng cách thêm đuôi "-ly".'],
              color: 'bg-blue-50 border-blue-200 text-blue-900',
              tagColor: 'bg-blue-100 text-blue-700'
            },
            {
              id: 'adj_quant',
              title: 'Tính từ Định lượng (Quantitative)',
              icon: <i className="fa-solid fa-layer-group text-[18px]"></i>,
              nature: 'Bản chất đo lường. Xác định số lượng, dung lượng của danh từ mà không cần số đếm chính xác.',
              rules: 'Luôn đứng TRƯỚC danh từ. Quyết định danh từ theo sau là số ít, số nhiều hay không đếm được.',
              tags: ['#trước-danh-từ', '#cấu-trúc-câu'],
              examples: ['*Many* people', '*Much* water', '*Several* options'],
              relations: ['Có sự tương đồng với Trạng từ Mức độ về mặt ý nghĩa đo lường.'],
              color: 'bg-indigo-50 border-indigo-200 text-indigo-900',
              tagColor: 'bg-indigo-100 text-indigo-700'
            },
            {
              id: 'adj_irreg',
              title: 'Tính từ Ngoại lệ (Irregular)',
              icon: <i className="fa-solid fa-bolt text-[18px]"></i>,
              nature: 'Phá vỡ quy tắc hình thái thông thường, không thay đổi dạng hoặc biến đổi hoàn toàn khi chuyển sang trạng từ hoặc so sánh.',
              rules: 'Cần học thuộc lòng. Một số từ vừa là tính từ vừa là trạng từ.',
              tags: ['#ngoại-lệ', '#vị-trí-linh-hoạt'],
              examples: ['*Good* (adj) -> Well (adv)', '*Fast* (adj) -> Fast (adv)', '*Hard* (adj) -> Hard (adv)'],
              relations: ['Là điểm giao thoa phức tạp nhất giữa Tính từ và Trạng từ.'],
              color: 'bg-rose-50 border-rose-200 text-rose-900',
              tagColor: 'bg-rose-100 text-rose-700'
            }
          ],
          adverbs: [
            {
              id: 'adv_manner',
              title: 'Trạng từ Thể cách (Manner)',
              icon: <i className="fa-solid fa-chart-line text-[18px]"></i>,
              nature: 'Bản chất động. Trả lời câu hỏi "Như thế nào?". Mô tả CÁCH THỨC một hành động diễn ra.',
              rules: 'Thường đứng SAU động từ thường hoặc sau tân ngữ (nếu có). KHÔNG đứng giữa động từ và tân ngữ.',
              tags: ['#sau-động-từ', '#biến-đổi-hình-thái'],
              examples: ['She sings *beautifully*.', 'He drives the car *carefully*.'],
              relations: ['Hầu hết được hình thành từ Tính từ Miêu tả + hậu tố "-ly".'],
              color: 'bg-emerald-50 border-emerald-200 text-emerald-900',
              tagColor: 'bg-emerald-100 text-emerald-700'
            },
            {
              id: 'adv_freq',
              title: 'Trạng từ Tần suất (Frequency)',
              icon: <i className="fa-solid fa-chart-line text-[18px]"></i>,
              nature: 'Bản chất chu kỳ. Trả lời câu hỏi "Bao lâu một lần?". Xác định độ lặp lại của hành động.',
              rules: 'Vị trí đặc biệt: TRƯỚC động từ thường, nhưng SAU động từ tobe/trợ động từ.',
              tags: ['#vị-trí-linh-hoạt', '#cấu-trúc-câu'],
              examples: ['I *always* wake up early.', 'She is *never* late.'],
              relations: ['Bổ sung ý nghĩa thời gian vi mô cho động từ.'],
              color: 'bg-teal-50 border-teal-200 text-teal-900',
              tagColor: 'bg-teal-100 text-teal-700'
            },
            {
              id: 'adv_degree',
              title: 'Trạng từ Mức độ (Degree)',
              icon: <i className="fa-solid fa-chart-line text-[18px]"></i>,
              nature: 'Bản chất khuếch đại/thu hẹp. Trả lời câu hỏi "Đến mức nào?". Dùng để tăng giảm sắc thái.',
              rules: 'Thường đứng TRƯỚC Tính từ, Trạng từ khác, hoặc Động từ mà nó bổ nghĩa.',
              tags: ['#chỉ-mức-độ', '#trước-danh-từ'],
              examples: ['The water is *extremely* cold.', 'I *quite* agree with you.'],
              relations: ['Kẻ "nâng đỡ" cho Tính từ và các Trạng từ khác, tạo ra chiều sâu cho câu.'],
              color: 'bg-cyan-50 border-cyan-200 text-cyan-900',
              tagColor: 'bg-cyan-100 text-cyan-700'
            },
            {
              id: 'adv_sentence',
              title: 'Trạng từ Liên kết / Toàn câu (Sentence)',
              icon: <i className="fa-solid fa-chart-line text-[18px]"></i>,
              nature: 'Bản chất thái độ/logic. Thể hiện quan điểm của người nói về toàn bộ sự việc hoặc nối logic giữa các câu.',
              rules: 'Thường đứng ĐẦU câu, ngăn cách với câu bằng dấu phẩy (,).',
              tags: ['#cấu-trúc-câu', '#vị-trí-linh-hoạt'],
              examples: ['*Fortunately*, we arrived in time.', '*However*, the weather was bad.'],
              relations: ['Nằm ngoài cấu trúc nòng cốt của câu, đóng vai trò như người dẫn chuyện.'],
              color: 'bg-green-50 border-green-200 text-green-900',
              tagColor: 'bg-green-100 text-green-700'
            }
          ]
        };

        // --- COMPONENT: SƠ ĐỒ TƯ DUY (MINDMAP) ---
        const MindmapView = ({ onNodeClick }) => {
          return (
            <div className="relative w-full h-[600px] bg-slate-50 rounded-2xl border border-slate-200 overflow-hidden flex items-center justify-center p-8">
              {/* Background Grid */}
              <div className="absolute inset-0" style={{ backgroundImage: 'radial-gradient(#cbd5e1 1px, transparent 1px)', backgroundSize: '20px 20px', opacity: 0.3 }}></div>
              
              {/* SVG Connecting Lines */}
              <svg className="absolute inset-0 w-full h-full pointer-events-none">
                <path d="M 50% 20% Q 30% 35% 25% 50%" stroke="#94a3b8" strokeWidth="2" fill="none" strokeDasharray="5,5" />
                <path d="M 50% 20% Q 70% 35% 75% 50%" stroke="#94a3b8" strokeWidth="2" fill="none" strokeDasharray="5,5" />
                
                <path d="M 25% 50% L 15% 75%" stroke="#bfdbfe" strokeWidth="3" fill="none" />
                <path d="M 25% 50% L 25% 80%" stroke="#bfdbfe" strokeWidth="3" fill="none" />
                <path d="M 25% 50% L 35% 75%" stroke="#bfdbfe" strokeWidth="3" fill="none" />

                <path d="M 75% 50% L 60% 75%" stroke="#a7f3d0" strokeWidth="3" fill="none" />
                <path d="M 75% 50% L 70% 85%" stroke="#a7f3d0" strokeWidth="3" fill="none" />
                <path d="M 75% 50% L 80% 85%" stroke="#a7f3d0" strokeWidth="3" fill="none" />
                <path d="M 75% 50% L 90% 75%" stroke="#a7f3d0" strokeWidth="3" fill="none" />

                <path d="M 15% 75% Q 40% 90% 60% 75%" stroke="#f59e0b" strokeWidth="2" fill="none" strokeDasharray="4,4" opacity="0.6" />
                <text x="37%" y="81%" fill="#d97706" fontSize="12" fontWeight="bold">Thêm đuôi "-ly"</text>
                
                <path d="M 35% 75% Q 55% 65% 80% 85%" stroke="#f59e0b" strokeWidth="2" fill="none" strokeDasharray="4,4" opacity="0.6" />
                <text x="52%" y="71%" fill="#d97706" fontSize="12" fontWeight="bold">Cùng bổ nghĩa mức độ</text>
              </svg>

              {/* Nodes */}
              <div className="absolute top-[15%] left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-10">
                <div className="bg-slate-800 text-white px-6 py-3 rounded-xl shadow-lg font-bold text-lg border-4 border-slate-700 hover:scale-105 transition-transform cursor-default text-center">
                  MODIFIERS <br/><span className="text-sm font-normal text-slate-300">(Từ Bổ Nghĩa)</span>
                </div>
              </div>

              <div className="absolute top-[50%] left-[25%] transform -translate-x-1/2 -translate-y-1/2 z-10">
                <div className="bg-blue-600 text-white px-5 py-2 rounded-lg shadow-md font-bold text-md border-2 border-blue-400 hover:scale-110 transition-transform cursor-pointer text-center" onClick={() => onNodeClick('adj_desc')}>
                  TÍNH TỪ (Adjectives) <br/><span className="text-xs font-normal text-blue-100">Bản chất Tĩnh</span>
                </div>
              </div>
              <div className="absolute top-[50%] left-[75%] transform -translate-x-1/2 -translate-y-1/2 z-10">
                <div className="bg-emerald-600 text-white px-5 py-2 rounded-lg shadow-md font-bold text-md border-2 border-emerald-400 hover:scale-110 transition-transform cursor-pointer text-center" onClick={() => onNodeClick('adv_manner')}>
                  TRẠNG TỪ (Adverbs) <br/><span className="text-xs font-normal text-emerald-100">Bản chất Động</span>
                </div>
              </div>

              <div className="absolute top-[75%] left-[15%] transform -translate-x-1/2 -translate-y-1/2 z-10 cursor-pointer hover:scale-110 transition-all" onClick={() => onNodeClick('adj_desc')}>
                <div className="bg-white text-blue-800 px-3 py-2 rounded shadow text-sm font-semibold border border-blue-200">Miêu tả</div>
              </div>
              <div className="absolute top-[80%] left-[25%] transform -translate-x-1/2 -translate-y-1/2 z-10 cursor-pointer hover:scale-110 transition-all" onClick={() => onNodeClick('adj_quant')}>
                <div className="bg-white text-indigo-800 px-3 py-2 rounded shadow text-sm font-semibold border border-indigo-200">Định lượng</div>
              </div>
              <div className="absolute top-[75%] left-[35%] transform -translate-x-1/2 -translate-y-1/2 z-10 cursor-pointer hover:scale-110 transition-all" onClick={() => onNodeClick('adj_irreg')}>
                <div className="bg-white text-rose-800 px-3 py-2 rounded shadow text-sm font-semibold border border-rose-200 shadow-rose-200">Ngoại lệ</div>
              </div>

              <div className="absolute top-[75%] left-[60%] transform -translate-x-1/2 -translate-y-1/2 z-10 cursor-pointer hover:scale-110 transition-all" onClick={() => onNodeClick('adv_manner')}>
                <div className="bg-white text-emerald-800 px-3 py-2 rounded shadow text-sm font-semibold border border-emerald-200">Thể cách</div>
              </div>
              <div className="absolute top-[85%] left-[70%] transform -translate-x-1/2 -translate-y-1/2 z-10 cursor-pointer hover:scale-110 transition-all" onClick={() => onNodeClick('adv_freq')}>
                <div className="bg-white text-teal-800 px-3 py-2 rounded shadow text-sm font-semibold border border-teal-200">Tần suất</div>
              </div>
              <div className="absolute top-[85%] left-[80%] transform -translate-x-1/2 -translate-y-1/2 z-10 cursor-pointer hover:scale-110 transition-all" onClick={() => onNodeClick('adv_degree')}>
                <div className="bg-white text-cyan-800 px-3 py-2 rounded shadow text-sm font-semibold border border-cyan-200">Mức độ</div>
              </div>
              <div className="absolute top-[75%] left-[90%] transform -translate-x-1/2 -translate-y-1/2 z-10 cursor-pointer hover:scale-110 transition-all" onClick={() => onNodeClick('adv_sentence')}>
                <div className="bg-white text-green-800 px-3 py-2 rounded shadow text-sm font-semibold border border-green-200">Toàn câu</div>
              </div>
            </div>
          );
        };

        // --- MAIN APP COMPONENT ---
        const App = () => {
          const [activeTab, setActiveTab] = useState('mindmap');
          const [activeTag, setActiveTag] = useState('#tất-cả');
          const [selectedItem, setSelectedItem] = useState(null);
          const [animateState, setAnimateState] = useState(false);

          useEffect(() => {
            setAnimateState(true);
            const timer = setTimeout(() => setAnimateState(false), 300);
            return () => clearTimeout(timer);
          }, [activeTab, activeTag]);

          const handleOpenDetail = (id) => {
            const item = grammarData.adjectives.find(i => i.id === id) || grammarData.adverbs.find(i => i.id === id);
            if (item) setSelectedItem(item);
          };

          const filterItems = (items) => {
            if (activeTag === '#tất-cả') return items;
            return items.filter(item => item.tags.includes(activeTag));
          };

          const renderCard = (item) => (
            <div 
              key={item.id} 
              onClick={() => handleOpenDetail(item.id)}
              className={`relative p-5 rounded-xl border-2 cursor-pointer transition-all duration-300 hover:-translate-y-1 hover:shadow-lg ${item.color}`}
            >
              <div className="flex items-center gap-2 mb-3">
                <div className="bg-white p-2 rounded-full shadow-sm w-8 h-8 flex items-center justify-center">{item.icon}</div>
                <h3 className="font-bold text-lg">{item.title}</h3>
              </div>
              <p className="text-sm opacity-90 line-clamp-2 mb-4">{item.nature}</p>
              
              <div className="flex flex-wrap gap-2 mt-auto">
                {item.tags.map(tag => (
                  <span key={tag} className={`text-xs px-2 py-1 rounded-full font-medium ${item.tagColor}`}>
                    {tag}
                  </span>
                ))}
              </div>
              <div className="absolute top-4 right-4 opacity-0 hover:opacity-100 transition-opacity">
                <i className="fa-solid fa-arrow-right text-current opacity-50 text-[20px]"></i>
              </div>
            </div>
          );

          return (
            <div className="min-h-screen text-slate-800 font-sans p-4 md:p-8">
              <div className="max-w-6xl mx-auto space-y-6">
                
                {/* HEADER & NAVIGATION */}
                <header className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex flex-col md:flex-row justify-between items-center gap-4">
                  <div>
                    <h1 className="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-emerald-600 flex items-center gap-3">
                      <i className="fa-solid fa-project-diagram text-blue-600 text-[32px]"></i>
                      Bản Đồ Ngữ Pháp Động
                    </h1>
                    <p className="text-slate-500 mt-1 font-medium">Khám phá Bản chất & Mối quan hệ giữa Tính từ - Trạng từ</p>
                  </div>
                  
                  <div className="flex bg-slate-100 p-1 rounded-xl">
                    {['mindmap', 'adjectives', 'adverbs'].map((tab) => (
                      <button
                        key={tab}
                        onClick={() => setActiveTab(tab)}
                        className={`px-6 py-2.5 rounded-lg font-semibold text-sm transition-all duration-300 ${
                          activeTab === tab 
                            ? 'bg-white text-slate-900 shadow-sm' 
                            : 'text-slate-500 hover:text-slate-700 hover:bg-slate-200/50'
                        }`}
                      >
                        {tab === 'mindmap' ? 'Sơ đồ Tư duy' : tab === 'adjectives' ? 'Khối Tính Từ' : 'Khối Trạng Từ'}
                      </button>
                    ))}
                  </div>
                </header>

                {/* MAIN CONTENT AREA */}
                <main className={`transition-all duration-300 ${animateState ? 'opacity-0 translate-y-2' : 'opacity-100 translate-y-0'}`}>
                  
                  {activeTab === 'mindmap' && (
                    <div className="space-y-4">
                      <div className="bg-blue-50 text-blue-800 p-4 rounded-xl text-sm border border-blue-200 flex items-start gap-3">
                        <i className="fa-solid fa-circle-info shrink-0 mt-1 text-blue-600 text-[20px]"></i>
                        <p><strong>Hướng dẫn tương tác:</strong> Sơ đồ thể hiện hệ sinh thái của các "Từ bổ nghĩa". Bạn có thể thấy Tính từ và Trạng từ không tồn tại độc lập mà có sự chuyển hóa lẫn nhau (đường nét đứt màu cam). <br/>👉 <strong>Click vào các nút (nodes)</strong> trên sơ đồ để xem bản chất chi tiết của từng phân loại.</p>
                      </div>
                      <MindmapView onNodeClick={handleOpenDetail} />
                    </div>
                  )}

                  {(activeTab === 'adjectives' || activeTab === 'adverbs') && (
                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                      <div className="flex flex-col md:flex-row items-center gap-4 mb-8 pb-6 border-b border-slate-100">
                        <div className="flex items-center gap-2 text-slate-500 font-medium">
                          <i className="fa-solid fa-tags text-[18px]"></i>
                          <span>Hệ thống nhãn phân loại (Tags):</span>
                        </div>
                        <div className="flex flex-wrap gap-2">
                          {tagsData.map(tag => (
                            <button
                              key={tag}
                              onClick={() => setActiveTag(tag)}
                              className={`px-3 py-1.5 rounded-full text-xs font-semibold transition-all ${
                                activeTag === tag 
                                  ? 'bg-slate-800 text-white' 
                                  : 'bg-slate-100 text-slate-600 hover:bg-slate-200'
                              }`}
                            >
                              {tag}
                            </button>
                          ))}
                        </div>
                      </div>

                      <div>
                        <h2 className="text-2xl font-bold mb-6 flex items-center gap-3">
                          {activeTab === 'adjectives' ? (
                            <><i className="fa-solid fa-book-open text-blue-500"></i> Phân loại Tính từ (Adjectives)</>
                          ) : (
                            <><i className="fa-solid fa-chart-line text-emerald-500"></i> Phân loại Trạng từ (Adverbs)</>
                          )}
                        </h2>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                          {filterItems(activeTab === 'adjectives' ? grammarData.adjectives : grammarData.adverbs).map(renderCard)}
                        </div>

                        {filterItems(activeTab === 'adjectives' ? grammarData.adjectives : grammarData.adverbs).length === 0 && (
                          <div className="text-center py-12 text-slate-400">
                            <i className="fa-solid fa-magnifying-glass text-[48px] mx-auto mb-4 opacity-20 block"></i>
                            <p>Không có dữ liệu nào khớp với nhãn <strong>{activeTag}</strong> trong mục này.</p>
                            <p className="text-sm mt-2">Thử chuyển sang thẻ khác hoặc chọn nhãn #tất-cả.</p>
                          </div>
                        )}
                      </div>
                    </div>
                  )}
                </main>
              </div>

              {/* MODAL CHI TIẾT */}
              {selectedItem && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm transition-opacity">
                  <div className="bg-white rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto shadow-2xl transform transition-all">
                    
                    <div className={`p-6 border-b flex justify-between items-center ${selectedItem.color.split(' ')[0]}`}>
                      <div className="flex items-center gap-3">
                        <div className="bg-white p-2 w-10 h-10 flex items-center justify-center rounded-xl shadow-sm">{selectedItem.icon}</div>
                        <h2 className={`text-2xl font-bold ${selectedItem.color.split(' ').pop()}`}>{selectedItem.title}</h2>
                      </div>
                      <button 
                        onClick={() => setSelectedItem(null)}
                        className="p-2 w-10 h-10 flex items-center justify-center bg-white/50 hover:bg-white rounded-full transition-colors"
                      >
                        <i className="fa-solid fa-xmark text-slate-600 text-[20px]"></i>
                      </button>
                    </div>

                    <div className="p-6 space-y-6">
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                          <h3 className="font-bold text-slate-800 flex items-center gap-2 mb-2">
                            <i className="fa-solid fa-bolt text-amber-500"></i> Bản chất cốt lõi
                          </h3>
                          <p className="text-slate-600 text-sm leading-relaxed">{selectedItem.nature}</p>
                        </div>
                        <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                          <h3 className="font-bold text-slate-800 flex items-center gap-2 mb-2">
                            <i className="fa-solid fa-book-open text-blue-500"></i> Quy luật vị trí
                          </h3>
                          <p className="text-slate-600 text-sm leading-relaxed">{selectedItem.rules}</p>
                        </div>
                      </div>

                      <div>
                        <h3 className="font-bold text-slate-800 flex items-center gap-2 mb-3 border-b pb-2">
                          <i className="fa-solid fa-project-diagram text-indigo-500"></i> Mối quan hệ tương quan
                        </h3>
                        <ul className="space-y-2">
                          {selectedItem.relations.map((rel, idx) => (
                            <li key={idx} className="flex items-start gap-3 text-sm text-slate-600 bg-indigo-50/50 p-3 rounded-lg border border-indigo-100">
                              <i className="fa-solid fa-arrow-right text-indigo-400 mt-1 shrink-0"></i>
                              <span>{rel}</span>
                            </li>
                          ))}
                        </ul>
                      </div>

                      <div>
                        <h3 className="font-bold text-slate-800 flex items-center gap-2 mb-3 border-b pb-2">
                          <i className="fa-solid fa-chart-line text-emerald-500"></i> Ví dụ phân tích
                        </h3>
                        <div className="space-y-3">
                          {selectedItem.examples.map((ex, idx) => {
                            const parts = ex.split('*');
                            return (
                              <div key={idx} className="p-3 bg-white border border-slate-200 rounded-lg shadow-sm text-slate-700">
                                {parts.map((part, i) => i % 2 !== 0 ? (
                                  <span key={i} className={`font-bold underline decoration-2 underline-offset-4 ${selectedItem.color.split(' ').pop().replace('900', '600')}`}>
                                    {part}
                                  </span>
                                ) : part)}
                              </div>
                            )
                          })}
                        </div>
                      </div>

                      <div className="pt-4 flex flex-wrap gap-2">
                        {selectedItem.tags.map(tag => (
                          <span key={tag} className="text-xs px-3 py-1.5 rounded-full font-medium bg-slate-100 text-slate-600 border border-slate-200">
                            {tag}
                          </span>
                        ))}
                      </div>

                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
