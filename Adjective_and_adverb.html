<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sơ Đồ Tư Duy Ngữ Pháp Pro - Adjectives & Adverbs</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM (CDN) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .node-pulse { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- HỆ THỐNG DỮ LIỆU NÂNG CẤP (CHUYÊN SÂU) ---
        const tagsData = [
          '#tất-cả', 
          '#ngoại-lệ-cực-hạn', 
          '#vị-trí-ưu-tiên', 
          '#trật-tự-tính-từ', 
          '#bẫy-đuôi-ly', 
          '#nhấn-mạnh', 
          '#liên-kết-logic',
          '#biến-đổi-nghĩa'
        ];

        const grammarData = {
          adjectives: [
            {
              id: 'adj_desc',
              title: 'Tính từ Miêu tả & Trật tự OSASCOMP',
              icon: <i className="fa-solid fa-sort-amount-down text-[18px]"></i>,
              nature: 'Bản chất định danh tính chất. Khi nhiều tính từ cùng bổ nghĩa cho 1 danh từ, phải tuân theo trật tự logic não bộ (Ý kiến -> Kích thước -> Tuổi -> Hình dạng -> Màu sắc -> Nguồn gốc -> Chất liệu -> Mục đích).',
              rules: 'Vị trí: Opinion - Size - Age - Shape - Color - Origin - Material - Purpose. Nếu sai trật tự này, câu sẽ mất tự nhiên.',
              tags: ['#trật-tự-tính-từ', '#vị-trí-ưu-tiên'],
              examples: ['A *beautiful* (Op) *small* (Size) *old* (Age) *round* (Shape) *blue* (Color) *French* (Origin) *wooden* (Material) *fishing* (Purpose) boat.'],
              relations: ['Sinh ra Adverb of Manner. Lưu ý các tính từ có đuôi -ly sẵn như friendly, lovely, silly -> Không thể thêm -ly nữa mà phải dùng cấu trúc "In a ... way".'],
              color: 'bg-blue-50 border-blue-200 text-blue-900',
              tagColor: 'bg-blue-100 text-blue-700'
            },
            {
              id: 'adj_limit',
              title: 'Tính từ Chỉ định & Sở hữu',
              icon: <i className="fa-solid fa-fingerprint text-[18px]"></i>,
              nature: 'Bản chất giới hạn phạm vi. Xác định chính xác đối tượng đang được nhắc tới (this, that, my, your, each, every).',
              rules: 'Luôn đứng đầu tiên trong cụm danh từ, đứng trước cả tính từ miêu tả. Không bao giờ đứng sau danh từ.',
              tags: ['#vị-trí-ưu-tiên', '#liên-kết-logic'],
              examples: ['*This* expensive car.', '*Every* single student.'],
              relations: ['Đóng vai trò nền tảng để xác định danh từ trước khi các bổ ngữ khác can thiệp.'],
              color: 'bg-indigo-50 border-indigo-200 text-indigo-900',
              tagColor: 'bg-indigo-100 text-indigo-700'
            },
            {
              id: 'adj_confusing',
              title: 'Tính từ Gây nhiễu (Bẫy Ngữ Pháp)',
              icon: <i className="fa-solid fa-triangle-exclamation text-[18px]"></i>,
              nature: 'Các cặp tính từ đuôi -ed (cảm xúc chủ thể) và -ing (tính chất vật thể/nguyên nhân). Và các tính từ trông giống trạng từ.',
              rules: 'Phân biệt: "I am bored" (Tôi thấy chán) vs "The movie is boring" (Phim gây chán). Tránh nhầm lẫn các từ như: costly, cowardly, deadly (đều là Adj dù có đuôi -ly).',
              tags: ['#ngoại-lệ-cực-hạn', '#bẫy-đuôi-ly'],
              examples: ['A *deadly* weapon (Adj).', 'She felt *confused* (Adj-ed) because the map was *confusing* (Adj-ing).'],
              relations: ['Đây là khu vực học sinh dễ mất điểm nhất trong các bài thi trắc nghiệm.'],
              color: 'bg-rose-50 border-rose-200 text-rose-900',
              tagColor: 'bg-rose-100 text-rose-700'
            }
          ],
          adverbs: [
            {
              id: 'adv_manner_pro',
              title: 'Trạng từ Thể cách & Biến đổi Nghĩa',
              icon: <i className="fa-solid fa-wand-magic-sparkles text-[18px]"></i>,
              nature: 'Mô tả cách thức. Đặc biệt: Một số từ khi thêm -ly sẽ đổi hoàn toàn ý nghĩa nguyên bản.',
              rules: 'Hard (chăm chỉ) -> Hardly (hầu như không). Late (muộn) -> Lately (gần đây). High (vị trí cao) -> Highly (rất, với sự tôn trọng).',
              tags: ['#biến-đổi-nghĩa', '#ngoại-lệ-cực-hạn'],
              examples: ['He works *hard* (chăm chỉ).', 'He can *hardly* work (hầu như không thể làm việc).', 'I have seen her *lately* (gần đây).'],
              relations: ['Bản chất là trạng từ nhưng chức năng chuyển dịch sang trạng từ chỉ tần suất hoặc mức độ.'],
              color: 'bg-emerald-50 border-emerald-200 text-emerald-900',
              tagColor: 'bg-emerald-100 text-emerald-700'
            },
            {
              id: 'adv_place_time',
              title: 'Trạng từ Nơi chốn & Thời gian',
              icon: <i className="fa-solid fa-map-location-dot text-[18px]"></i>,
              nature: 'Bản chất bối cảnh. Trả lời cho câu hỏi Where? và When?. Quy định khung thời không cho hành động.',
              rules: 'Thứ tự ưu tiên cuối câu: [Nơi chốn] trước -> [Thời gian] sau. Nếu thời gian nhấn mạnh, có thể đưa lên đầu câu.',
              tags: ['#vị-trí-ưu-tiên', '#liên-kết-logic'],
              examples: ['I will meet you *there* (Place) *tomorrow* (Time).', '*Yesterday*, everything seemed fine.'],
              relations: ['Thường đi kèm với các giới từ để tạo thành cụm trạng ngữ.'],
              color: 'bg-teal-50 border-teal-200 text-teal-900',
              tagColor: 'bg-teal-100 text-teal-700'
            },
            {
              id: 'adv_degree_intensifier',
              title: 'Trạng từ Mức độ & Từ Nhấn mạnh',
              icon: <i className="fa-solid fa-gauge-high text-[18px]"></i>,
              nature: 'Bản chất năng lượng. Điều chỉnh "âm lượng" của tính từ và trạng từ khác. Bao gồm cả các từ giảm nhẹ (slightly, quite).',
              rules: 'Đặc biệt: "Enough" đứng SAU tính từ (Good enough), nhưng các trạng từ khác luôn đứng TRƯỚC (Very good).',
              tags: ['#nhấn-mạnh', '#vị-trí-ưu-tiên'],
              examples: ['It is *fairly* hot.', 'You are not tall *enough*.'],
              relations: ['Tương tác trực tiếp với Khối Tính Từ Miêu Tả.'],
              color: 'bg-cyan-50 border-cyan-200 text-cyan-900',
              tagColor: 'bg-cyan-100 text-cyan-700'
            },
            {
              id: 'adv_comment',
              title: 'Trạng từ Quan điểm (Comment Adverbs)',
              icon: <i className="fa-solid fa-bullhorn text-[18px]"></i>,
              nature: 'Bản chất cảm xúc người nói. Nhận xét về toàn bộ nội dung câu (Surprisingly, Honestly, Clearly).',
              rules: 'Luôn đứng tách biệt bằng dấu phẩy. Thể hiện thái độ của chủ thể nói trước khi đưa ra thông tin.',
              tags: ['#nhấn-mạnh', '#liên-kết-logic'],
              examples: ['*Honestly*, I don\'t know.', '*Surprisingly*, he won the race.'],
              relations: ['Giống như một "vỏ bọc" cảm xúc cho cả mệnh đề.'],
              color: 'bg-green-50 border-green-200 text-green-900',
              tagColor: 'bg-green-100 text-green-700'
            }
          ]
        };

        // --- COMPONENT: SƠ ĐỒ TƯ DUY (MINDMAP) ---
        const MindmapView = ({ onNodeClick }) => {
          return (
            <div className="w-full overflow-x-auto bg-white rounded-2xl border border-slate-200 shadow-xl p-4">
              <div className="relative min-w-[1000px] h-[650px] mx-auto">
                {/* SVG Connections */}
                <svg className="absolute inset-0 w-full h-full pointer-events-none" viewBox="0 0 1000 650">
                  <defs>
                    <marker id="arrow-main" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="4" markerHeight="4" orient="auto">
                      <path d="M 0 1 L 8 5 L 0 9 z" fill="#64748b" />
                    </marker>
                    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="0%">
                      <stop offset="0%" style={{stopColor:'#3b82f6', stopOpacity:1}} />
                      <stop offset="100%" style={{stopColor:'#6366f1', stopOpacity:1}} />
                    </linearGradient>
                  </defs>

                  {/* Root to Branches */}
                  <path d="M 500 100 L 250 220" stroke="#cbd5e1" strokeWidth="2" fill="none" markerEnd="url(#arrow-main)" />
                  <path d="M 500 100 L 750 220" stroke="#cbd5e1" strokeWidth="2" fill="none" markerEnd="url(#arrow-main)" />

                  {/* Sub-branches Adjectives */}
                  <path d="M 250 280 L 150 400" stroke="#bfdbfe" strokeWidth="2" fill="none" />
                  <path d="M 250 280 L 250 430" stroke="#bfdbfe" strokeWidth="2" fill="none" />
                  <path d="M 250 280 L 350 400" stroke="#bfdbfe" strokeWidth="2" fill="none" />

                  {/* Sub-branches Adverbs */}
                  <path d="M 750 280 L 600 400" stroke="#a7f3d0" strokeWidth="2" fill="none" />
                  <path d="M 750 280 L 700 450" stroke="#a7f3d0" strokeWidth="2" fill="none" />
                  <path d="M 750 280 L 800 450" stroke="#a7f3d0" strokeWidth="2" fill="none" />
                  <path d="M 750 280 L 900 400" stroke="#a7f3d0" strokeWidth="2" fill="none" />

                  {/* Complex Links (Dashed) */}
                  <path d="M 150 430 Q 500 550 850 430" stroke="#f59e0b" strokeWidth="2" strokeDasharray="6,4" fill="none" opacity="0.4" />
                  <text x="500" y="530" fill="#d97706" fontSize="12" textAnchor="middle" fontWeight="bold">Tương tác OSASCOMP & Vị trí Ưu tiên</text>
                </svg>

                {/* Root Node */}
                <div className="absolute top-[50px] left-1/2 -translate-x-1/2 z-20">
                  <div className="bg-slate-900 text-white px-8 py-4 rounded-2xl shadow-2xl border-4 border-slate-700 text-center">
                    <div className="text-xs uppercase tracking-widest text-slate-400 mb-1 font-bold">The Core of</div>
                    <div className="text-2xl font-black">ENGLISH MODIFIERS</div>
                  </div>
                </div>

                {/* Major Categories */}
                <div className="absolute top-[220px] left-[25%] -translate-x-1/2 z-20">
                  <button onClick={() => onNodeClick('adj_desc')} className="group relative bg-blue-600 text-white p-6 rounded-xl shadow-xl hover:scale-105 transition-all duration-300 border-b-4 border-blue-800">
                    <div className="absolute -top-3 -right-3 bg-amber-400 text-slate-900 text-[10px] font-black px-2 py-1 rounded-full uppercase">Static</div>
                    <i className="fa-solid fa-shapes text-2xl mb-2 block"></i>
                    <span className="font-bold text-lg">ADJECTIVES</span>
                  </button>
                </div>

                <div className="absolute top-[220px] left-[75%] -translate-x-1/2 z-20">
                  <button onClick={() => onNodeClick('adv_manner_pro')} className="group relative bg-emerald-600 text-white p-6 rounded-xl shadow-xl hover:scale-105 transition-all duration-300 border-b-4 border-emerald-800">
                    <div className="absolute -top-3 -right-3 bg-amber-400 text-slate-900 text-[10px] font-black px-2 py-1 rounded-full uppercase">Dynamic</div>
                    <i className="fa-solid fa-person-running text-2xl mb-2 block"></i>
                    <span className="font-bold text-lg">ADVERBS</span>
                  </button>
                </div>

                {/* Adjectives Sub-nodes */}
                <div className="absolute top-[415px] left-[15%] -translate-x-1/2 cursor-pointer" onClick={() => onNodeClick('adj_desc')}>
                    <div className="bg-white border-2 border-blue-200 p-3 rounded-lg shadow-sm hover:shadow-md text-center font-bold text-blue-700 text-sm w-32">Miêu tả & OSASCOMP</div>
                </div>
                <div className="absolute top-[445px] left-[25%] -translate-x-1/2 cursor-pointer" onClick={() => onNodeClick('adj_limit')}>
                    <div className="bg-white border-2 border-indigo-200 p-3 rounded-lg shadow-sm hover:shadow-md text-center font-bold text-indigo-700 text-sm w-32">Chỉ định & Sở hữu</div>
                </div>
                <div className="absolute top-[415px] left-[35%] -translate-x-1/2 cursor-pointer" onClick={() => onNodeClick('adj_confusing')}>
                    <div className="bg-white border-2 border-rose-200 p-3 rounded-lg shadow-sm hover:shadow-md text-center font-bold text-rose-700 text-sm w-32">Bẫy Adj -ed/-ing</div>
                </div>

                {/* Adverbs Sub-nodes */}
                <div className="absolute top-[415px] left-[60%] -translate-x-1/2 cursor-pointer" onClick={() => onNodeClick('adv_manner_pro')}>
                    <div className="bg-white border-2 border-emerald-200 p-3 rounded-lg shadow-sm hover:shadow-md text-center font-bold text-emerald-700 text-sm w-32">Thể cách & Nghĩa ẩn</div>
                </div>
                <div className="absolute top-[465px] left-[70%] -translate-x-1/2 cursor-pointer" onClick={() => onNodeClick('adv_place_time')}>
                    <div className="bg-white border-2 border-teal-200 p-3 rounded-lg shadow-sm hover:shadow-md text-center font-bold text-teal-700 text-sm w-32">Nơi chốn / Thời gian</div>
                </div>
                <div className="absolute top-[465px] left-[80%] -translate-x-1/2 cursor-pointer" onClick={() => onNodeClick('adv_degree_intensifier')}>
                    <div className="bg-white border-2 border-cyan-200 p-3 rounded-lg shadow-sm hover:shadow-md text-center font-bold text-cyan-700 text-sm w-32">Mức độ & Enough</div>
                </div>
                <div className="absolute top-[415px] left-[90%] -translate-x-1/2 cursor-pointer" onClick={() => onNodeClick('adv_comment')}>
                    <div className="bg-white border-2 border-green-200 p-3 rounded-lg shadow-sm hover:shadow-md text-center font-bold text-green-700 text-sm w-32">Quan điểm toàn câu</div>
                </div>
              </div>
            </div>
          );
        };

        // --- MAIN APP COMPONENT ---
        const App = () => {
          const [activeTab, setActiveTab] = useState('mindmap');
          const [activeTag, setActiveTag] = useState('#tất-cả');
          const [selectedItem, setSelectedItem] = useState(null);

          const filteredAdjectives = useMemo(() => {
            if (activeTag === '#tất-cả') return grammarData.adjectives;
            return grammarData.adjectives.filter(i => i.tags.includes(activeTag));
          }, [activeTag]);

          const filteredAdverbs = useMemo(() => {
            if (activeTag === '#tất-cả') return grammarData.adverbs;
            return grammarData.adverbs.filter(i => i.tags.includes(activeTag));
          }, [activeTag]);

          const handleNodeClick = (id) => {
            const allItems = [...grammarData.adjectives, ...grammarData.adverbs];
            const item = allItems.find(i => i.id === id);
            if (item) setSelectedItem(item);
          };

          const renderCard = (item) => (
            <div 
              key={item.id} 
              onClick={() => setSelectedItem(item)}
              className={`group p-6 rounded-2xl border-2 cursor-pointer transition-all duration-300 hover:shadow-2xl hover:-translate-y-2 flex flex-col h-full ${item.color}`}
            >
              <div className="flex justify-between items-start mb-4">
                <div className="bg-white p-3 rounded-xl shadow-sm text-xl">{item.icon}</div>
                <div className="opacity-0 group-hover:opacity-100 transition-opacity">
                  <i className="fa-solid fa-circle-plus text-lg"></i>
                </div>
              </div>
              <h3 className="font-black text-xl mb-2 leading-tight">{item.title}</h3>
              <p className="text-sm opacity-80 mb-6 flex-grow">{item.nature}</p>
              <div className="flex flex-wrap gap-2 pt-4 border-t border-black/5">
                {item.tags.map(t => (
                  <span key={t} className={`text-[10px] font-black uppercase tracking-tighter px-2 py-1 rounded ${item.tagColor}`}>
                    {t}
                  </span>
                ))}
              </div>
            </div>
          );

          return (
            <div className="min-h-screen pb-20">
              {/* Top Navigation Bar */}
              <nav className="bg-white/80 backdrop-blur-md sticky top-0 z-40 border-b border-slate-200">
                <div className="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
                  <div className="flex items-center gap-3">
                    <div className="bg-slate-900 text-white w-10 h-10 rounded-lg flex items-center justify-center font-black shadow-lg">G</div>
                    <div>
                      <h1 className="font-black text-xl tracking-tight text-slate-900">GrammarPro <span className="text-blue-600">v2.0</span></h1>
                      <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none">Modifier Masterclass</div>
                    </div>
                  </div>
                  
                  <div className="flex bg-slate-100 p-1 rounded-xl gap-1">
                    {[
                      {id:'mindmap', label:'Sơ Đồ'},
                      {id:'adjectives', label:'Tính Từ'},
                      {id:'adverbs', label:'Trạng Từ'}
                    ].map(tab => (
                      <button 
                        key={tab.id}
                        onClick={() => setActiveTab(tab.id)}
                        className={`px-6 py-2 rounded-lg text-sm font-bold transition-all ${activeTab === tab.id ? 'bg-white text-slate-900 shadow-md' : 'text-slate-500 hover:text-slate-700'}`}
                      >
                        {tab.label}
                      </button>
                    ))}
                  </div>
                </div>
              </nav>

              <div className="max-w-7xl mx-auto px-4 mt-8">
                {/* Tag Cloud */}
                <div className="flex items-center gap-3 mb-8 overflow-x-auto pb-2 no-scrollbar">
                  <div className="shrink-0 flex items-center gap-2 text-slate-400 font-black text-xs uppercase tracking-widest pr-4 border-r border-slate-200">
                    <i className="fa-solid fa-filter"></i> Lọc Nâng Cao
                  </div>
                  {tagsData.map(tag => (
                    <button 
                      key={tag}
                      onClick={() => setActiveTag(tag)}
                      className={`shrink-0 px-4 py-2 rounded-full text-xs font-bold transition-all border-2 ${activeTag === tag ? 'bg-slate-900 border-slate-900 text-white' : 'bg-white border-slate-200 text-slate-600 hover:border-slate-400'}`}
                    >
                      {tag}
                    </button>
                  ))}
                </div>

                {/* Content Sections */}
                <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
                  {activeTab === 'mindmap' && (
                    <div className="space-y-6">
                      <div className="bg-gradient-to-r from-blue-600 to-indigo-700 rounded-2xl p-8 text-white shadow-2xl relative overflow-hidden">
                        <div className="relative z-10">
                          <h2 className="text-3xl font-black mb-2">Bản Đồ Hệ Sinh Thái Modifiers</h2>
                          <p className="opacity-80 max-w-2xl font-medium">Khám phá cách tính từ và trạng từ vận hành. Click vào các Node để xem quy luật "vàng" giúp bạn làm chủ 90% các bài thi ngữ pháp nâng cao.</p>
                        </div>
                        <i className="fa-solid fa-microchip absolute -right-10 -bottom-10 text-[200px] opacity-10 rotate-12"></i>
                      </div>
                      <MindmapView onNodeClick={handleNodeClick} />
                    </div>
                  )}

                  {activeTab === 'adjectives' && (
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                      {filteredAdjectives.map(renderCard)}
                    </div>
                  )}

                  {activeTab === 'adverbs' && (
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                      {filteredAdverbs.map(renderCard)}
                    </div>
                  )}
                </div>
              </div>

              {/* Advanced Detail Modal */}
              {selectedItem && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-slate-900/80 backdrop-blur-md" onClick={() => setSelectedItem(null)}></div>
                  <div className="bg-white rounded-3xl w-full max-w-3xl overflow-hidden shadow-2xl relative z-10 animate-in zoom-in-95 duration-200 flex flex-col md:flex-row max-h-[90vh]">
                    {/* Modal Sidebar */}
                    <div className={`md:w-1/3 p-8 flex flex-col items-center text-center justify-center border-b md:border-b-0 md:border-r border-slate-100 ${selectedItem.color}`}>
                      <div className="bg-white p-6 rounded-2xl shadow-xl text-4xl mb-6">
                        {selectedItem.icon}
                      </div>
                      <h2 className="text-2xl font-black mb-4 leading-tight">{selectedItem.title}</h2>
                      <div className="flex flex-wrap justify-center gap-2">
                        {selectedItem.tags.map(t => (
                          <span key={t} className="bg-white/50 text-[10px] font-bold px-2 py-1 rounded uppercase tracking-tighter">
                            {t}
                          </span>
                        ))}
                      </div>
                    </div>

                    {/* Modal Body */}
                    <div className="md:w-2/3 p-8 overflow-y-auto">
                      <button 
                        onClick={() => setSelectedItem(null)}
                        className="absolute top-6 right-6 w-10 h-10 flex items-center justify-center rounded-full bg-slate-100 hover:bg-slate-200 transition-colors"
                      >
                        <i className="fa-solid fa-xmark text-slate-500"></i>
                      </button>

                      <div className="space-y-8">
                        <section>
                          <h4 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-2">
                            <i className="fa-solid fa-dna text-blue-500"></i> Bản chất & Nguyên lý
                          </h4>
                          <p className="text-slate-700 leading-relaxed font-medium">{selectedItem.nature}</p>
                        </section>

                        <section>
                          <h4 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-2">
                            <i className="fa-solid fa-gavel text-indigo-500"></i> Quy tắc vàng (Rules)
                          </h4>
                          <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 text-sm text-slate-600 leading-relaxed italic">
                            "{selectedItem.rules}"
                          </div>
                        </section>

                        <section>
                          <h4 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-2">
                            <i className="fa-solid fa-lightbulb text-amber-500"></i> Ví dụ Phân tích Pro
                          </h4>
                          <div className="space-y-3">
                            {selectedItem.examples.map((ex, i) => {
                              const parts = ex.split('*');
                              return (
                                <div key={i} className="p-4 bg-white border-l-4 border-slate-900 shadow-sm text-slate-800 font-mono text-sm">
                                  {parts.map((p, idx) => idx % 2 !== 0 ? <strong key={idx} className="text-blue-600 underline">{p}</strong> : p)}
                                </div>
                              );
                            })}
                          </div>
                        </section>

                        <section className="bg-slate-900 text-white p-6 rounded-2xl">
                          <h4 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-3">
                            Mối quan hệ Hệ sinh thái
                          </h4>
                          <ul className="space-y-3">
                            {selectedItem.relations.map((r, i) => (
                              <li key={i} className="text-sm flex gap-3 items-start">
                                <i className="fa-solid fa-link text-blue-400 mt-1"></i>
                                <span className="opacity-90">{r}</span>
                              </li>
                            ))}
                          </ul>
                        </section>
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
